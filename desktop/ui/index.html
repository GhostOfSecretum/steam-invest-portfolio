<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Invest · Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0c11; --bg-card: #12151e; --line: rgba(255,255,255,0.06);
      --fg-0: #e8e6e3; --fg-1: #b8b5b0; --fg-2: #7a7874; --fg-3: #4a4844;
      --accent: oklch(0.68 0.22 5); --green: #34d399; --amber: #f59e0b; --red: #ef4444;
      --f-body: 'Inter', -apple-system, sans-serif;
      --f-mono: 'JetBrains Mono', 'SF Mono', monospace;
    }
    body {
      background: var(--bg); color: var(--fg-0); font-family: var(--f-body);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 32px; -webkit-app-region: drag;
    }
    .card {
      background: var(--bg-card); border: 1px solid var(--line); border-radius: 16px;
      padding: 32px; max-width: 460px; width: 100%; -webkit-app-region: no-drag;
    }
    .eyebrow {
      font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--fg-3); margin-bottom: 12px;
    }
    h1 { font-size: 28px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 8px; }
    p { color: var(--fg-1); font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
    input {
      width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.03); color: var(--fg-0); font-family: var(--f-mono);
      font-size: 14px; outline: none; margin-bottom: 12px;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: none; transition: all 120ms; width: 100%; margin-bottom: 8px;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { filter: brightness(1.15); }
    .btn-ghost { background: rgba(255,255,255,0.04); color: var(--fg-0); border: 1px solid var(--line); }
    .btn-ghost:hover { background: rgba(255,255,255,0.08); }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .status { font-family: var(--f-mono); font-size: 12px; color: var(--fg-2); margin-top: 12px; }
    .status.ok { color: var(--green); }
    .status.err { color: var(--red); }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .dot.green { background: var(--green); }
    .dot.amber { background: var(--amber); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Step 1: Pairing -->
    <div id="step-pair">
      <div class="eyebrow">// STEAM INVEST · DESKTOP</div>
      <h1>Connect to server</h1>
      <p>Open your Steam Invest Portfolio website, go to profile settings, and generate a pairing code. Enter it below.</p>
      <input id="server-url" type="text" value="http://localhost:3000" placeholder="Server URL" />
      <input id="pairing-code" type="text" placeholder="6-digit pairing code" maxlength="6" autocomplete="off" />
      <button class="btn btn-primary" id="btn-pair">Connect</button>
      <div id="pair-status" class="status"></div>
    </div>

    <!-- Step 2: Connected -->
    <div id="step-connected" class="hidden">
      <div class="eyebrow">// CONNECTED</div>
      <h1><span class="dot green"></span>Desktop linked</h1>
      <p id="connected-info">Ready to sync your full CS2 inventory.</p>

      <button class="btn btn-ghost" id="btn-steam-login">Log in to Steam</button>
      <button class="btn btn-primary" id="btn-sync">Sync inventory now</button>
      <button class="btn btn-danger" id="btn-disconnect">Disconnect</button>
      <div id="sync-status" class="status"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    async function init() {
      const state = await window.desktop.getState();
      if (state.deviceToken && state.steamId) {
        showConnected(state);
      } else {
        showPairing();
      }
    }

    function showPairing() {
      $('step-pair').classList.remove('hidden');
      $('step-connected').classList.add('hidden');
    }

    function showConnected(state) {
      $('step-pair').classList.add('hidden');
      $('step-connected').classList.remove('hidden');
      const last = state.lastSync ? `Last sync: ${new Date(state.lastSync).toLocaleString()}` : 'Not synced yet';
      $('connected-info').textContent = `Steam ID: ${state.steamId} · ${last}`;
    }

    $('btn-pair').addEventListener('click', async () => {
      const serverUrl = $('server-url').value.trim();
      const code = $('pairing-code').value.trim();
      $('pair-status').className = 'status';
      $('pair-status').textContent = 'Connecting...';
      try {
        const result = await window.desktop.pairDevice({ serverUrl, code });
        $('pair-status').className = 'status ok';
        $('pair-status').textContent = `Paired to ${result.steamId}`;
        const state = await window.desktop.getState();
        showConnected(state);
      } catch (err) {
        $('pair-status').className = 'status err';
        $('pair-status').textContent = err.message;
      }
    });

    $('btn-steam-login').addEventListener('click', async () => {
      $('sync-status').className = 'status';
      $('sync-status').textContent = 'Opening Steam login...';
      try {
        await window.desktop.openSteamLogin();
        $('sync-status').className = 'status ok';
        $('sync-status').textContent = 'Steam session ready. Click "Sync inventory now".';
      } catch (err) {
        $('sync-status').className = 'status err';
        $('sync-status').textContent = err.message;
      }
    });

    $('btn-sync').addEventListener('click', async () => {
      $('sync-status').className = 'status';
      $('sync-status').textContent = 'Syncing inventory...';
      try {
        const result = await window.desktop.syncInventory();
        $('sync-status').className = 'status ok';
        $('sync-status').textContent = `Synced ${result.itemCount} rows (${result.totalPieces} items total)`;
        const state = await window.desktop.getState();
        showConnected(state);
      } catch (err) {
        $('sync-status').className = 'status err';
        $('sync-status').textContent = err.message;
      }
    });

    $('btn-disconnect').addEventListener('click', async () => {
      await window.desktop.disconnect();
      showPairing();
    });

    init();
  </script>
</body>
</html>
